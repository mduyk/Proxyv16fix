<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>DELTA SHOP 1 - V16 PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #0d0d16; --cyan: #00f2ff; --gold: #ffcc00; --card: #161625; --red: #ff4444; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; margin: 0; user-select: none; }
        .box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; outline: none; font-size: 13px; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 5px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-main { background: var(--cyan); color: #000; }
        .btn-gold { background: var(--gold); color: #000; }
        .st-Success { color: #00ff88; font-weight:bold; } .st-Fail { color: var(--red); font-weight:bold; } .st-Pending { color: var(--gold); font-weight:bold; }
        table { width:100%; font-size:11px; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid #222; }
        .key-box { background: rgba(0,242,255,0.05); padding: 10px; border: 1px dashed var(--cyan); color: var(--cyan); margin-top: 5px; border-radius: 8px; font-size: 11px; word-break: break-all; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        #adm-ctrl { border: 2px solid var(--red); display: none; }
        .count { display: block; font-size: 10px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="auth-box" class="box" style="max-width: 400px; margin: 50px auto;">
        <div id="login-form">
            <h3 style="text-align:center">LOGIN SHOP 1</h3>
            <input type="text" id="au" placeholder="Tài khoản...">
            <input type="password" id="ap" placeholder="Mật khẩu...">
            <button class="btn-main" onclick="login()">VÀO SHOP</button>
            <button style="background:none; color:#888; font-size:11px;" onclick="toggleAuth(true)">Đăng ký tài khoản</button>
        </div>
        <div id="reg-form" style="display:none">
            <h3 style="text-align:center">REGISTER</h3>
            <input type="text" id="ru" placeholder="Tên muốn tạo...">
            <input type="password" id="rp" placeholder="Mật khẩu...">
            <button style="background:#00ff88; color:#000" onclick="register()">XÁC NHẬN ĐĂNG KÝ</button>
            <button style="background:none; color:#888; font-size:11px;" onclick="toggleAuth(false)">Quay lại đăng nhập</button>
        </div>
    </div>

    <div id="shop-ui" style="display:none; max-width: 500px; margin: auto;">
        <div id="adm-ctrl" class="box">
            <h4 style="color:var(--red); margin:0 0 10px 0;">ADMIN PANEL</h4>
            <div class="grid">
                <button id="btn-sv" onclick="toggleSV()">ĐANG TẢI...</button>
                <button style="background:#555" onclick="upPrices()">CẬP NHẬT GIÁ</button>
            </div>
            <div class="grid" style="margin-top:10px">
                <div><small>Ngày</small><input type="number" id="p-ngay"></div>
                <div><small>Tuần</small><input type="number" id="p-tuan"></div>
                <div><small>Tháng</small><input type="number" id="p-thang"></div>
                <div><small>Năm</small><input type="number" id="p-nam"></div>
                <div><small>R-Tuần</small><input type="number" id="pr-tuan"></div>
                <div><small>R-Tháng</small><input type="number" id="pr-thang"></div>
                <div><small>R-Năm</small><input type="number" id="pr-nam"></div>
            </div>
        </div>

        <div id="sv-off" class="box" style="display:none; background:#441111; color:#ffaaaa; text-align:center; font-weight:bold;">⚠️ MÁY CHỦ BẢO TRÌ</div>
        
        <div class="box">
            <span>Sếp: <b id="u-id" style="color:var(--cyan)"></b></span> | Ví: <b id="u-bl" style="color:var(--gold)">0</b>đ
            <input type="number" id="n-amt" placeholder="Số tiền nạp...">
            <button class="btn-gold sv-btn" onclick="nap()">NẠP TIỀN QR</button>
            <div id="qr" style="display:none; text-align:center; margin-top:10px;">
                <img id="q-img" style="width:160px; border: 2px solid #fff; border-radius:10px;">
                <button class="btn-main" onclick="guiDon()">XÁC NHẬN ĐÃ CHUYỂN</button>
            </div>
        </div>

        <div class="box">
            <h4>🎲 RANDOM</h4>
            <div class="grid">
                <button class="btn-main sv-btn" onclick="buyR('r_tuan', 12, 'tuan')">TUẦN (<span class="txt-pr-tuan">...</span>)<span class="count" id="c-r-tuan">Còn 0</span></button>
                <button class="btn-main sv-btn" onclick="buyR('r_thang', 10, 'thang')">THÁNG (<span class="txt-pr-thang">...</span>)<span class="count" id="c-r-thang">Còn 0</span></button>
                <button class="btn-main sv-btn" style="grid-column: span 2" onclick="buyR('r_nam', 50, 'nam')">NĂM (<span class="txt-pr-nam">...</span>)<span class="count" id="c-r-nam">Còn 0</span></button>
            </div>
        </div>

        <div class="box" style="border-color: var(--gold);">
            <h4>💎 MUA THẲNG</h4>
            <div class="grid">
                <button class="btn-gold sv-btn" onclick="buyD('ngay')">NGÀY (<span class="txt-p-ngay">...</span>)<span class="count" id="c-ngay">Còn 0</span></button>
                <button class="btn-gold sv-btn" onclick="buyD('tuan')">TUẦN (<span class="txt-p-tuan">...</span>)<span class="count" id="c-tuan">Còn 0</span></button>
                <button class="btn-gold sv-btn" onclick="buyD('thang')">THÁNG (<span class="txt-p-thang">...</span>)<span class="count" id="c-thang">Còn 0</span></button>
                <button class="btn-gold sv-btn" onclick="buyD('nam')">NĂM (<span class="txt-p-nam">...</span>)<span class="count" id="c-nam">Còn 0</span></button>
            </div>
        </div>

        <div class="box"><span style="font-size:12px;color:#888">🔑 KHO KEY</span><div id="h-keys"></div></div>
        <div class="box"><span style="font-size:12px;color:#888">🕒 LỊCH SỬ NẠP</span><table><tbody id="h-pay"></tbody></table></div>
    </div>

<script>
    const config = { apiKey: "AIzaSyBk6R1TDZeAxh37JQLgL_6Wl0v8m8Sg0", databaseURL: "https://shopctv-61f96-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(config); const db = firebase.database(); 
    let cur = null, curUID = null, isAdmin = false, currentStatus = "Open", prices = {}, rPrices = {};

    db.ref('system/shop1').on('value', s => {
        const d = s.val() || {};
        currentStatus = d.status || "Open";
        prices = d.prices || { ngay: 20000, tuan: 40000, thang: 80000, nam: 300000 };
        rPrices = d.rPrices || { tuan: 20000, thang: 40000, nam: 80000 };
        document.getElementById('sv-off').style.display = (currentStatus === 'Closed') ? 'block' : 'none';
        document.querySelectorAll('.sv-btn').forEach(b => b.disabled = (currentStatus === 'Closed' && !isAdmin));
        for (let k in prices) {
            document.querySelectorAll('.txt-p-'+k).forEach(el => el.innerText = Number(prices[k]).toLocaleString() + 'đ');
            if(isAdmin && document.getElementById('p-'+k)) document.getElementById('p-'+k).value = prices[k];
        }
        for (let k in rPrices) {
            document.querySelectorAll('.txt-pr-'+k).forEach(el => el.innerText = Number(rPrices[k]).toLocaleString() + 'đ');
            if(isAdmin && document.getElementById('pr-'+k)) document.getElementById('pr-'+k).value = rPrices[k];
        }
        if(isAdmin) {
            const b = document.getElementById('btn-sv');
            b.innerText = currentStatus === 'Open' ? "ĐÓNG SERVER" : "MỞ SERVER";
            b.style.background = currentStatus === 'Open' ? "var(--red)" : "#0f9d58";
        }
    });

    db.ref('keys/shop1').on('value', s => {
        const d = s.val() || {};
        const list = ['ngay','tuan','thang','nam'];
        list.forEach(t => {
            const count = d[t] ? Object.keys(d[t]).length : 0;
            if(document.getElementById('c-'+t)) document.getElementById('c-'+t).innerText = `Còn ${count}`;
            if(document.getElementById('c-r-'+t)) document.getElementById('c-r-'+t).innerText = `Còn ${count}`;
        });
    });

    function login(){
        const u = document.getElementById('au').value.trim().toLowerCase(), p = document.getElementById('ap').value;
        db.ref('users_shop1/'+u).once('value', s => {
            const d = s.val();
            if(d && d.password == p){
                cur = u; curUID = d.uid; isAdmin = (d.role === 'admin');
                document.getElementById('auth-box').style.display='none';
                document.getElementById('shop-ui').style.display='block';
                document.getElementById('u-id').innerText = u;
                if(isAdmin) document.getElementById('adm-ctrl').style.display = 'block';
                db.ref('users_shop1/'+u+'/balance').on('value', b => document.getElementById('u-bl').innerText = (b.val()||0).toLocaleString());
                db.ref('history_keys/'+curUID).on('value', h => {
                    const b = document.getElementById('h-keys'); b.innerHTML = "";
                    h.forEach(c => { b.innerHTML += `<div class="key-box"><b>${c.val().type}</b>: ${c.val().key}</div>`; });
                });
                db.ref('history_pay/'+curUID).on('value', h => {
                    const t = document.getElementById('h-pay'); t.innerHTML = "";
                    let arr = []; h.forEach(c => arr.push(c.val()));
                    arr.reverse().forEach(i => {
                        let st = i.status==='Success'?'Thành công':(i.status==='Fail'?'Hủy':'Chờ');
                        t.innerHTML += `<tr><td>${i.time}</td><td>${Number(i.amount).toLocaleString()}đ</td><td class="st-${i.status}">${st}</td></tr>`;
                    });
                });
            } else alert("Sai thông tin!");
        });
    }

    function toggleSV() { db.ref('system/shop1/status').set(currentStatus === 'Open' ? 'Closed' : 'Open'); }
    function upPrices() {
        db.ref('system/shop1/prices').set({ ngay: document.getElementById('p-ngay').value, tuan: document.getElementById('p-tuan').value, thang: document.getElementById('p-thang').value, nam: document.getElementById('p-nam').value });
        db.ref('system/shop1/rPrices').set({ tuan: document.getElementById('pr-tuan').value, thang: document.getElementById('pr-thang').value, nam: document.getElementById('pr-nam').value }).then(() => alert("Xong!"));
    }

    function buyD(t){
        const p = Number(prices[t]);
        db.ref('users_shop1/'+cur+'/balance').transaction(b => { if(b >= p) return b - p; }, (err, com) => {
            if(com){
                db.ref('keys/shop1/'+t).limitToFirst(1).once('value', k => {
                    if(!k.val()) return alert("Hết key!");
                    const kid = Object.keys(k.val())[0], kv = k.val()[kid];
                    db.ref('keys/shop1/'+t+'/'+kid).remove();
                    db.ref('history_keys/'+curUID).push({time:new Date().toLocaleString(), type:'Mua '+t.toUpperCase(), key:kv});
                    alert("KEY: "+kv);
                });
            } else alert("Hết tiền!");
        });
    }

    function buyR(r, rate, t){
        const p = Number(rPrices[t]);
        db.ref('users_shop1/'+cur+'/balance').transaction(b => { if(b >= p) return b - p; }, (err, com) => {
            if(com){
                db.ref('sys/v1/'+r).transaction(c => (c || 0) + 1, (e, c, s) => {
                    if(s.val() % rate === 0){
                        db.ref('keys/shop1/'+t).limitToFirst(1).once('value', k => {
                            if(!k.val()) return alert("Hết key!");
                            const kid = Object.keys(k.val())[0], kv = k.val()[kid];
                            db.ref('keys/shop1/'+t+'/'+kid).remove();
                            db.ref('history_keys/'+curUID).push({time:new Date().toLocaleString(), type:'Quay '+t.toUpperCase(), key:kv});
                            alert("TRÚNG: "+kv);
                        });
                    } else alert("Hụt rồi!");
                });
            } else alert("Hết tiền!");
        });
    }

    function nap(){
        const a = document.getElementById('n-amt').value; if(a < 1000) return alert("Min 1k");
        document.getElementById('q-img').src = `https://qr.sepay.vn/img?acc=0588807300000&bank=MB&amount=${a}&des=NAP%20${cur}`;
        document.getElementById('qr').style.display='block';
    }

    function guiDon(){
        const rid = db.ref('bank_requests').push().key, t = new Date().toLocaleTimeString();
        db.ref('bank_requests/'+rid).set({user:cur, uid:curUID, amount:document.getElementById('n-amt').value, shop:'users_shop1', status:'Pending', id:rid, time:t});
        db.ref('history_pay/'+curUID+'/'+rid).set({time:t, amount:document.getElementById('n-amt').value, status:'Pending', id:rid});
        alert("Đã gửi!"); document.getElementById('qr').style.display='none';
    }

    function toggleAuth(r) { document.getElementById('login-form').style.display = r?'none':'block'; document.getElementById('reg-form').style.display = r?'block':'none'; }
    function register() {
        const u = document.getElementById('ru').value.trim().toLowerCase(), p = document.getElementById('rp').value;
        if(u.length < 3) return alert("Quá ngắn!");
        db.ref('users_shop1/'+u).once('value', s => {
            if(s.exists()) return alert("Trùng!");
            const uid = "U" + Math.random().toString(36).substr(2, 9).toUpperCase();
            db.ref('users_shop1/'+u).set({password: p, balance: 0, status: 'Active', role: 'user', uid: uid});
            alert("Xong!"); toggleAuth(false);
        });
    }
</script>
</body>
</html>
